<p-toast></p-toast>
<form [formGroup]="form">
    <div class="col-12 pb-5">
        <div class="pb-3">
            <hr class="m-0 p-0">
            <h5>DD Team</h5>
        </div>
        <div class="grid">
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="originationLead" inputId="originationLead"
                        [options]="smeOrigination" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('originationLead')}" />
                    <label for="originationLead">Origination lead *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="originationPromoter" inputId="originationPromoter"
                        [options]="originationPromoters" optionLabel="origination_promoter" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('originationPromoter')}" />
                    <label for="originationPromoter">Origination Promoter *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="lead_desarrollo" inputId="lead_desarrollo"
                        [options]="lead_desarrollo" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('lead_desarrollo')}" />
                    <label for="lead_desarrollo">SME Development & Implementation *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="smeLegal" inputId="smeLegal"
                        [options]="leadLegal" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('smeLegal')}" />
                    <label for="smeLegal">SME Legal *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="smeSafeguards" inputId="smeSafeguards"
                        [options]="leadSafeguards" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('smeSafeguards')}" />
                    <label for="smeSafeguards">SME Safeguards *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="smeSIG" inputId="smeSIG"
                        [options]="leadSigs" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('smeSIG')}" />
                    <label for="smeSIG">SME SIG *</label>
                </p-floatlabel>
            </div>
            <div class="col-12 md:col-4">
                <p-floatlabel>
                    <p-select formControlName="smeMrv" inputId="smeMrv"
                        [options]="leadMrv" optionLabel="lead_name" styleClass="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': isInvalid('smeMrv')}" />
                    <label for="smeMrv">SME MRV *</label>
                </p-floatlabel>
            </div>
        </div>
    </div>

    <div class="flex justify-content-center flex-wrap">
        <div class="col-3">
        <!-- Con registro, no tiene EDIT pero sí CREATE: fallback con Save -->
            <p-button *ngIf="permissions['CREATE-ORIGINATION'] || permissions['EDIT-ORIGINATION']" styleClass="w-full" label="Save" [rounded]="true" [disabled]="isSaving || (hasData && !formChanged)" [loading]="isSaving" (click)="saveDocument()" />
            <small *ngIf="data?.Date || data?.NameUser">
                Last date modification:
                <span *ngIf="data?.Date">{{ data?.Date }}</span>
                <span *ngIf="data?.Date && data?.NameUser"> by </span>
                <span *ngIf="data?.NameUser">{{ data?.NameUser }}</span>
            </small>
        </div>
    </div>
</form>
