<div class="pt-3">
<p-table [value]="customers" size="small">
    <ng-template #header>
        <tr>
            <th style="width:5%">Folio</th>
            <th style="width:20%">SOP</th>
            <th style="width:20%">Activity</th>
            <th style="width:5%">Budget</th>
            <!--este sera dinamico-->
            <th style="width:4%">JAN</th>
        </tr>
    </ng-template>
    <ng-template #body let-customer>
        <tr>
            <td>ACTPAD001</td>
            <td>{{customer.company}}</td>
            <td>{{customer.company}}</td>
            <td>{{customer.company}}</td>
                   <!--este sera dinamico-->
            <td class="p-0 m-0"><div class="planned"></div></td>
        </tr>
    </ng-template>
     <ng-template #footer>
        <tr>
            <td colspan="2" class="text-right font-bold">Totals</td>
            <td class="font-bold">$000</td>
        </tr>
    </ng-template>
</p-table>
</div>
